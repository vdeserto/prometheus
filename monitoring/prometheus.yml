global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Backend metrics (frontend data)
  - job_name: 'frontend-metrics'
    static_configs:
      - targets: ['metrics-backend:3000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Backend health
  - job_name: 'backend-health'
    static_configs:
      - targets: ['metrics-backend:3000']
    metrics_path: '/health'
    scrape_interval: 30s
